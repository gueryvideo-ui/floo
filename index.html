<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramo de Flores Amarillas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #fff9c4 0%, #fbc02d 100%);
            font-family: 'Georgia', serif;
        }

        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        #overlay-text {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #5d4037;
            font-size: clamp(3rem, 8vw, 6rem);
            font-style: italic;
            text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            z-index: 5;
            text-align: center;
            width: 100%;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            font-weight: bold;
            background: #ffffff;
            color: #fbc02d;
        }

        #record-btn.recording {
            background-color: #ff5252;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="overlay-text">¿Espectadora?</div>

    <div id="ui-container">
        <button id="record-btn">Grabar Video</button>
    </div>

    <script>
        let scene, camera, renderer, bouquet;
        let mediaRecorder;
        let recordedChunks = [];
        const recordBtn = document.getElementById('record-btn');

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const spotLight = new THREE.SpotLight(0xffffff, 1);
            spotLight.position.set(10, 20, 10);
            scene.add(spotLight);

            // Crear el Ramo (Bouquet)
            bouquet = new THREE.Group();
            
            // Papel de regalo / Envoltorio del ramo
            const coneGeo = new THREE.ConeGeometry(2, 5, 32, 1, true);
            const coneMat = new THREE.MeshPhongMaterial({ color: 0xe0cda9, side: THREE.DoubleSide });
            const wrapper = new THREE.Mesh(coneGeo, coneMat);
            wrapper.rotation.x = Math.PI;
            wrapper.position.y = 1;
            bouquet.add(wrapper);

            // Generar 15 flores agrupadas
            for (let i = 0; i < 15; i++) {
                const flower = createFlower();
                // Posicionarlas en la parte superior del cono de forma circular
                const angle = (i / 15) * Math.PI * 2;
                const radius = 0.5 + Math.random() * 1.2;
                flower.position.x = Math.cos(angle) * radius;
                flower.position.z = Math.sin(angle) * radius;
                flower.position.y = 3.5 + (Math.random() * 1);
                flower.rotation.y = Math.random() * Math.PI;
                flower.rotation.x = (Math.random() - 0.5) * 0.5;
                bouquet.add(flower);
            }

            scene.add(bouquet);
            window.addEventListener('resize', onWindowResize, false);
        }

        function createFlower() {
            const flowerGroup = new THREE.Group();

            // Tallo corto
            const stemGeo = new THREE.CylinderGeometry(0.05, 0.05, 2);
            const stemMat = new THREE.MeshPhongMaterial({ color: 0x4caf50 });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            stem.position.y = -1;
            flowerGroup.add(stem);

            // Centro
            const centerGeo = new THREE.SphereGeometry(0.3, 16, 16);
            centerGeo.scale(1, 0.5, 1);
            const centerMat = new THREE.MeshPhongMaterial({ color: 0x5d4037 });
            const center = new THREE.Mesh(centerGeo, centerMat);
            flowerGroup.add(center);

            // Pétalos (Estilo Girasol/Margarita)
            const petalGeo = new THREE.CapsuleGeometry(0.15, 0.6, 4, 8);
            const petalMat = new THREE.MeshPhongMaterial({ color: 0xffeb3b });

            for (let j = 0; j < 10; j++) {
                const petal = new THREE.Mesh(petalGeo, petalMat);
                const pAngle = (j / 10) * Math.PI * 2;
                petal.position.x = Math.cos(pAngle) * 0.4;
                petal.position.z = Math.sin(pAngle) * 0.4;
                petal.rotation.z = pAngle + Math.PI / 2;
                petal.rotation.x = Math.PI / 2.5;
                flowerGroup.add(petal);
            }

            return flowerGroup;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // Movimiento suave del ramo completo
            bouquet.rotation.y = Math.sin(time * 0.5) * 0.2;
            bouquet.position.y = Math.sin(time * 1.5) * 0.3;

            renderer.render(scene, camera);
        }

        // Grabación
        recordBtn.onclick = () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                recordBtn.innerText = "Grabar Video";
                recordBtn.classList.remove('recording');
            } else {
                startRecording();
            }
        };

        function startRecording() {
            recordedChunks = [];
            const stream = renderer.domElement.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'espectadora.webm';
                a.click();
            };
            mediaRecorder.start();
            recordBtn.innerText = "Deteniendo...";
            recordBtn.classList.add('recording');
        }
    </script>
</body>
</html>
